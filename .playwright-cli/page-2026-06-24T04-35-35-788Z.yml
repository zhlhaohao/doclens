          - heading "哈尔滨头骨化石" [level=2] [ref=e166]
          - paragraph [ref=e167]:
            - text: 这具保存近乎完整的古
            - mark [ref=e168]: 人类
            - text: 头骨化石发现于黑龙江省哈尔滨市松花江畔的河相沉积层中，年代距今约30万至14.6万年（中更新世晚期）。头骨具有独特的形态特征组合：
          - list [ref=e169]:
            - listitem [ref=e170]:
              - strong [ref=e171]: 颅容量
              - text: ：约1420毫升，处于现代人变异范围内
            - listitem [ref=e172]:
              - strong [ref=e173]: 眉脊
              - text: ：极其粗壮，厚度达23毫米，超过同时期其他古
              - mark [ref=e174]: 人类
            - listitem [ref=e175]:
              - strong [ref=e176]: 面部特征
              - text: ：宽阔且低矮，颧骨高耸，具有明显的东亚原始特征
            - listitem [ref=e177]:
              - strong [ref=e178]: 鼻部形态
              - text: ：鼻腔宽大，适应寒冷气候的演化特征
            - listitem [ref=e179]:
              - strong [ref=e180]: 下颌骨
              - text: ：缺少下巴隆突，表明非智人
          - heading "古DNA分析突破" [level=2] [ref=e181]
          - paragraph [ref=e182]: 研究团队从头骨内耳岩骨部分成功提取到古DNA片段，这是中国北方地区首次从中更新世化石中获取古DNA。基因组测序结果显示：
          - list [ref=e183]:
            - listitem [ref=e184]: 该个体与西伯利亚丹尼索瓦洞穴发现的丹尼索瓦人基因组的亲和度最高
            - listitem [ref=e185]: 核基因组中约78%的片段可与丹尼索瓦人参考基因组匹配
            - listitem [ref=e186]: 与尼安德特人的基因流占比约3-5%
            - listitem [ref=e187]: 携带EPAS1基因的高海拔适应性变体，该基因在现代藏族人群中仍然存在
          - heading "丹尼索瓦人的分布范围" [level=2] [ref=e188]
          - paragraph [ref=e189]: 综合考古学、古DNA和形态学证据，丹尼索瓦人的地理分布范围远超此前认知：
          - list [ref=e190]:
            - listitem [ref=e191]:
              - strong [ref=e192]: 西伯利亚阿尔泰山
              - text: ：丹尼索瓦洞穴（模式产地），距今约20万年
            - listitem [ref=e193]:
              - strong [ref=e194]: 中国甘肃
              - text: ：夏河人下颌骨，距今约16万年
            - listitem [ref=e195]:
              - strong [ref=e196]: 中国黑龙江
              - text: ：哈尔滨人头骨，距今约30-15万年
            - listitem [ref=e197]:
              - strong [ref=e198]: 青藏高原
              - text: ：白石崖溶洞沉积物DNA，距今约10万年
            - listitem [ref=e199]:
              - strong [ref=e200]: 老挝
              - text: ：头骨化石（Tam Ngu Hao 2），距今约7万年
          - paragraph [ref=e201]: 这表明丹尼索瓦人曾广泛分布于从西伯利亚到东南亚的广大区域，适应了从极寒到热带的多种环境。
          - heading "与现代人的基因交流" [level=2] [ref=e202]
          - paragraph [ref=e203]: 现代人群中丹尼索瓦人的基因贡献呈现明显的地理差异：
          - list [ref=e204]:
            - listitem [ref=e205]:
              - strong [ref=e206]: 美拉尼西亚人
              - text: ：高达5%的丹尼索瓦人基因 ancestry
            - listitem [ref=e207]:
              - strong [ref=e208]: 东南亚人群
              - text: ：2-3%
            - listitem [ref=e209]:
              - strong [ref=e210]: 东亚人群
              - text: ：0.1-0.5%
            - listitem [ref=e211]:
              - strong [ref=e212]: 藏族人群
              - text: ：EPAS1基因几乎完全来源于丹尼索瓦人
          - paragraph [ref=e213]: 这些基因贡献对现代人群的免疫系统和高原适应性产生了深远影响。
