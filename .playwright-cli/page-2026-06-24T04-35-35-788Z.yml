                  - generic: 健康/肠道健康与益生菌科学指南.md:3
                  - generic: "## 肠道微生物组：人体的\"第二大脑\" 人体肠道内栖息着约100万亿个微生物，涵盖超过1000个物种，总重量约1.5-2公斤。这些微生物编码的基因总数是人类基因组的150倍以上，构成了一个复杂的生态系统——肠道微生物组（Gut Microbiome）。 近年来的研究揭示了肠道微生物组与人体健康的深层联系： - **免疫系统**：70%以上的免疫细胞分布在肠道，微生物组训练和调节免疫反应 - **代谢功能**：参与食物消化、维生素合成（K、B12、叶酸）和短链脂肪酸产生 - **脑肠轴**：通过迷走神经、神经递质和代谢产物与大脑双向通信 - **情绪调节**：约95%的血清素在肠道产生，直"
