        - heading "Z世代心理健康现状" [level=2] [ref=e214]
        - paragraph [ref=e215]: Z世代（1997-2012年出生）正面临前所未有的心理健康挑战。2025年《中国青年心理健康蓝皮书》显示，18-28岁人群中：
        - list [ref=e216]:
          - listitem [ref=e217]: 焦虑症状检出率：31.2%
          - listitem [ref=e218]: 抑郁症状检出率：24.8%
          - listitem [ref=e219]: 睡眠障碍发生率：42.5%
          - listitem [ref=e220]: 感到"持续压力"的比例：67.3%
        - paragraph [ref=e221]: 这一代人的心理健康挑战与独特的社会环境密切相关：
        - list [ref=e222]:
          - listitem [ref=e223]:
            - strong [ref=e224]: 社交媒体影响
            - text: ：日均使用社交媒体超过4小时，比较焦虑和FOMO（错失恐惧症）普遍
          - listitem [ref=e225]:
            - strong [ref=e226]: 学业与就业压力
            - text: ：高校扩招导致学历贬值，就业竞争空前激烈
          - listitem [ref=e227]:
            - strong [ref=e228]: 经济不确定性
            - text: ：房价高企、收入增长放缓，对未来的不确定感强烈
          - listitem [ref=e229]:
            - strong [ref=e230]: 信息过载
            - text: ：24小时不间断的信息流导致注意力碎片化和认知疲劳
        - heading "保健品消费趋势" [level=2] [ref=e231]
        - paragraph [ref=e232]: 令人关注的是，Z世代正在成为保健品消费的新兴主力军。
