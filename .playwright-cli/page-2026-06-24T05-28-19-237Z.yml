        - heading "消费特点" [level=3] [ref=e278]
        - paragraph [ref=e279]: Z世代的保健品消费呈现以下特点：
        - list [ref=e280]:
          - listitem [ref=e281]:
            - strong [ref=e282]: "\"朋克养生\""
            - text: ：一边熬夜一边吃保健品，追求即时效果
          - listitem [ref=e283]:
            - strong [ref=e284]: 社交驱动
            - text: ：小红书、抖音种草对购买决策影响达65%
          - listitem [ref=e285]:
            - strong [ref=e286]: 剂型偏好
            - text: ：软糖、果冻、即饮等新型剂型受欢迎，传统片剂胶囊吸引力下降
          - listitem [ref=e287]:
            - strong [ref=e288]: 成分透明
            - text: ：对成分表关注度高，偏好天然和清洁标签产品
        - heading "正念冥想与心理干预" [level=2] [ref=e289]
        - paragraph [ref=e290]: 除了保健品，越来越多的Z世代开始尝试非药物干预方式。
        - heading "正念冥想" [level=3] [ref=e291]
        - paragraph [ref=e292]: 正念冥想（Mindfulness Meditation）在Z世代中快速流行：
        - list [ref=e293]:
          - listitem [ref=e294]: 冥想类App（如潮汐、Keep冥想）月活用户超过2000万
          - listitem [ref=e295]: 18-28岁用户占比达58%
          - listitem [ref=e296]: 每日冥想10-15分钟，持续8周可使焦虑量表得分降低35%
          - listitem [ref=e297]: 结合呼吸法（4-7-8呼吸、箱式呼吸）效果更佳
        - heading "心理咨询" [level=3] [ref=e298]
        - paragraph [ref=e299]: 心理咨询的接受度显著提高：
        - list [ref=e300]:
          - listitem [ref=e301]: 32%的Z世代表示接受过心理咨询或治疗
          - listitem [ref=e302]: 线上心理咨询平台用户年增长45%
          - listitem [ref=e303]: 认知行为疗法（CBT）对焦虑和抑郁的有效率达60-80%
        - heading "运动干预" [level=3] [ref=e304]
        - paragraph [ref=e305]: 运动对心理健康的益处已得到大量研究支持：
        - list [ref=e306]:
          - listitem [ref=e307]: 每周3次、每次30分钟的有氧运动可使抑郁症状减轻40%
          - listitem [ref=e308]: 团体运动（如飞盘、瑜伽、团操）兼具社交功能，效果优于独自运动
          - listitem [ref=e309]: 户外运动（公园、森林）比室内运动多带来15-20%的心理健康改善
        - heading "企业和社会应对" [level=2] [ref=e310]
        - paragraph [ref=e311]: 社会各界正在加强对Z世代心理健康的关注：
        - list [ref=e312]:
          - listitem [ref=e313]: 教育部要求高校按1:4000的比例配备心理健康教育专职教师
          - listitem [ref=e314]: 腾讯、字节跳动等互联网企业推出员工心理健康计划（EAP）
          - listitem [ref=e315]: 社交媒体平台上线"情绪关怀"功能，识别和干预高风险内容
          - listitem [ref=e316]: 国家医保逐步覆盖心理咨询费用，部分城市试点免费心理健康服务
