        - generic [ref=e433]:
          - heading "5G与6G通信技术发展" [level=1] [ref=e434]
          - heading "5G网络部署现状" [level=2] [ref=e435]
          - paragraph [ref=e436]: 截至2025年底，全球5G网络已覆盖超过45%的人口，5G基站总数超过500万个。5G技术正在从基础设施建设阶段进入应用价值释放阶段。
