          - heading "太赫兹通信" [level=3] [ref=e593]
          - paragraph [ref=e594]: 太赫兹频段（0.1-10THz）是6G的核心频谱资源：
          - list [ref=e595]:
            - listitem [ref=e596]: 可用带宽：数十到数百GHz（远超毫米波）
            - listitem [ref=e597]: 传播特性：极高方向性，适合短距高速通信
            - listitem [ref=e598]: 应用场景：全息通信、数字孪生、数据中心互联
            - listitem [ref=e599]: 挑战：器件成熟度低、传播损耗极大、覆盖距离极短
          - heading "卫星融合（天地一体化）" [level=3] [ref=e600]
          - paragraph [ref=e601]: 6G将实现地面网络与卫星网络的无缝融合：
          - list [ref=e602]:
            - listitem [ref=e603]:
              - strong [ref=e604]: 低轨卫星星座
              - text: ：Starlink（7000+颗）、星网（规划12000+颗）、G60（规划12000颗）
            - listitem [ref=e605]:
              - strong [ref=e606]: 手机直连卫星
              - text: ：已实现短信和低速数据，2026年目标支持语音通话
            - listitem [ref=e607]:
              - strong [ref=e608]: 高空平台（HAPS）
              - text: ：20公里高度的太阳能无人机/气球提供广域覆盖
            - listitem [ref=e609]:
              - strong [ref=e610]: 无缝切换
              - text: ：地面-卫星间自动切换，用户无感知
          - heading "AI原生网络" [level=3] [ref=e611]
          - paragraph [ref=e612]: 6G将从设计之初就融入AI能力：
          - list [ref=e613]:
            - listitem [ref=e614]:
              - strong [ref=e615]: AI物理层
              - text: ：深度学习替代传统信号处理算法
            - listitem [ref=e616]:
              - strong [ref=e617]: 智能资源管理
              - text: ：AI实时优化频谱、功率和天线资源
            - listitem [ref=e618]:
              - strong [ref=e619]: 意图驱动网络
              - text: ：用户描述意图，AI自动配置网络
            - listitem [ref=e620]:
              - strong [ref=e621]: 自愈网络
              - text: ：AI检测和修复网络故障，实现零宕机
            - listitem [ref=e622]:
              - strong [ref=e623]: 语义通信
              - text: ：传输语义信息而非原始比特，压缩率提升100倍
          - heading "通信感知一体化（ISAC）" [level=3] [ref=e624]
          - paragraph [ref=e625]: 6G将通信和感知功能融合在同一个系统中：
          - list [ref=e626]:
            - listitem [ref=e627]: 无线信号同时用于通信和环境感知
            - listitem [ref=e628]: 可实现厘米级精度的目标检测和跟踪
