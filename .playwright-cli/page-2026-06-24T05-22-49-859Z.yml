                - cell "中国5G用户数" [ref=e460]
                - cell "10亿+" [ref=e461]
          - heading "5G技术演进" [level=3] [ref=e462]
          - paragraph [ref=e463]: 3GPP Release 18（5G-Advanced）在2024年完成标准化，标志着5G进入增强阶段：
          - list [ref=e464]:
            - listitem [ref=e465]:
              - strong [ref=e466]: 上行增强
              - text: ：上行峰值速率从1Gbps提升至3Gbps
            - listitem [ref=e467]:
              - strong [ref=e468]: AI/ML集成
              - text: ：网络侧AI实现智能资源分配和干扰管理
            - listitem [ref=e469]:
              - strong [ref=e470]: RedCap增强
              - text: ：轻量化5G终端成本降至50美元以下
            - listitem [ref=e471]:
              - strong [ref=e472]: 网络节能
              - text: ：AI驱动的基站节能方案降低能耗25%
            - listitem [ref=e473]:
              - strong [ref=e474]: 确定性网络
              - text: ：工业场景时延抖动控制在100微秒以内
          - heading "5G应用场景成熟度" [level=3] [ref=e475]
          - paragraph [ref=e476]:
            - strong [ref=e477]: 成熟应用（大规模商用）
          - list [ref=e478]:
            - listitem [ref=e479]: 固定无线接入（FWA）：全球超过3000万FWA用户
            - listitem [ref=e480]: 视频直播和娱乐：4K/8K直播、云游戏
            - listitem [ref=e481]: 工业互联网：远程控制、设备监控
            - listitem [ref=e482]: 智慧城市：视频监控、交通管理
          - paragraph [ref=e483]:
            - strong [ref=e484]: 成长应用（试点扩大中）
          - list [ref=e485]:
            - listitem [ref=e486]: 自动驾驶V2X：车路协同，覆盖主要高速公路
            - listitem [ref=e487]: 远程医疗：远程手术、应急救援
            - listitem [ref=e488]: 智慧矿山：5G远程驾驶矿车
            - listitem [ref=e489]: 智慧港口：无人集卡和自动化桥吊
          - paragraph [ref=e490]:
            - strong [ref=e491]: 探索应用（研发阶段）
          - list [ref=e492]:
            - listitem [ref=e493]: 数字孪生：全城市级别的实时数字映射
            - listitem [ref=e494]: 全息通信：裸眼3D视频通话
            - listitem [ref=e495]: 感知互联网：无线信号感知环境变化
          - heading "5G核心技术" [level=2] [ref=e496]
          - heading "毫米波（mmWave）" [level=3] [ref=e497]
          - paragraph [ref=e498]: 毫米波频段（24-100GHz）提供极高的带宽和容量：
          - table [ref=e499]:
            - rowgroup [ref=e500]:
              - row "频段 频率范围 可用带宽 峰值速率 覆盖范围" [ref=e501]:
