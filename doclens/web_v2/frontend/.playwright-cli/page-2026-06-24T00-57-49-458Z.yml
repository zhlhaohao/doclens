                  - cell "防跌倒训练，量力而行" [ref=f1e98]
            - heading "三、睡眠管理" [level=2] [ref=f1e99]
            - heading "3.1 科学睡眠时长" [level=3] [ref=f1e100]
            - paragraph [ref=f1e101]: 充足的睡眠是健康的基石。不同年龄段的推荐睡眠时长：
            - list [ref=f1e103]:
              - listitem [ref=f1e104]: 青少年（14-17岁）：8-10小时
              - listitem [ref=f1e105]: 成年人（18-64岁）：7-9小时
              - listitem [ref=f1e106]: 老年人（65岁以上）：7-8小时
            - heading "3.2 改善睡眠质量的建议" [level=3] [ref=f1e107]
            - generic [ref=f1e108]:
              - strong [ref=f1e109]: 注意事项：
              - text: 长期睡眠不足会增加心血管疾病、肥胖和认知功能下降的风险。
            - list [ref=f1e110]:
              - listitem [ref=f1e111]: 保持规律的作息时间，每天同一时间起床
              - listitem [ref=f1e112]: 睡前1小时避免使用电子设备
              - listitem [ref=f1e113]: 卧室温度保持在18-22°C
              - listitem [ref=f1e114]: 避免睡前摄入咖啡因和酒精
              - listitem [ref=f1e115]: 适当补充褪黑素（需咨询医生）
              - listitem [ref=f1e116]: GABA和酸枣仁可辅助改善睡眠质量
            - heading "四、心理健康" [level=2] [ref=f1e117]
            - heading "4.1 Z世代健康行为数据" [level=3] [ref=f1e118]
            - paragraph [ref=f1e119]: 最新调查显示，Z世代（1995-2010年出生）采取最多的健康行为：
            - generic [ref=f1e120]:
