            - heading "二、运动健身指南" [level=2] [ref=f1e60]
            - heading "2.1 WHO 运动建议" [level=3] [ref=f1e61]
            - paragraph [ref=f1e62]: 世界卫生组织建议成年人每周进行：
            - list [ref=f1e64]:
              - listitem [ref=f1e65]:
                - strong [ref=f1e66]: 有氧运动
                - text: ：至少150-300分钟中等强度，或75-150分钟高强度
              - listitem [ref=f1e67]:
                - strong [ref=f1e68]: 力量训练
                - text: ：每周至少2次，覆盖主要肌群
              - listitem [ref=f1e69]:
                - strong [ref=f1e70]: 柔韧性训练
                - text: ：每周至少2-3次拉伸
            - heading "2.2 不同年龄段的运动方案" [level=3] [ref=f1e71]
            - table [ref=f1e72]:
