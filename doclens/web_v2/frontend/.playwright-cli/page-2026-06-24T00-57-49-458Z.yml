            - paragraph [ref=f1e3]:
              - text: 随着生活水平的提高和健康意识的增强，科学养生已成为全民关注的话题。国家卫生健康委将每年9月定为
              - strong [ref=f1e4]: 全民健康生活方式宣传月
              - text: ，2025年9月1日是第19个全民健康生活方式日。
            - heading "一、科学饮食营养" [level=2] [ref=f1e5]
            - heading "1.1 膳食纤维的重要性" [level=3] [ref=f1e6]
            - paragraph [ref=f1e7]:
              - text: 2025年十大营养热词中，
              - strong [ref=f1e8]: 膳食纤维
              - text: 位居前列。科学护肠饮食法则建议：
            - list [ref=f1e10]:
              - listitem [ref=f1e11]:
                - text: 每天摄入
                - strong [ref=f1e12]: 25-30克膳食纤维
              - listitem [ref=f1e13]: 富含纤维的食物：燕麦、豆类、西蓝花、全麦面包
              - listitem [ref=f1e14]: 膳食纤维能"喂饱"双歧杆菌等有益菌，维护肠道健康
            - heading "1.2 多酚类抗氧化物质" [level=3] [ref=f1e15]
            - paragraph [ref=f1e16]: 多酚是一类重要的植物化学物质，具有强大的抗氧化功能。
            - list [ref=f1e18]:
              - listitem [ref=f1e19]: 来源：蓝莓、绿茶、黑巧克力、红酒（适量）
              - listitem [ref=f1e20]: 功效：增强肠道健康、抗炎、延缓衰老
              - listitem [ref=f1e21]: 建议每天摄入500-1000毫克多酚
