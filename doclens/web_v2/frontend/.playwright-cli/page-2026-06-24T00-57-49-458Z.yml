                - paragraph [ref=f1e135]: 科学饮食管理
              - generic [ref=f1e136]:
                - heading "24.7%" [level=4] [ref=f1e137]
                - paragraph [ref=f1e138]: 坚持运动
            - heading "4.2 压力管理技巧" [level=3] [ref=f1e139]
            - list [ref=f1e140]:
              - listitem [ref=f1e141]:
                - strong [ref=f1e142]: 正念冥想
                - text: ：每天10-15分钟，专注呼吸
              - listitem [ref=f1e143]:
                - strong [ref=f1e144]: 运动减压
                - text: ：运动时释放内啡肽，改善情绪
              - listitem [ref=f1e145]:
                - strong [ref=f1e146]: 社交连接
                - text: ：与亲友保持定期联系
              - listitem [ref=f1e147]:
                - strong [ref=f1e148]: 时间管理
                - text: ：合理规划，避免过度承诺
              - listitem [ref=f1e149]:
                - strong [ref=f1e150]: 专业帮助
                - text: ：必要时寻求心理咨询
            - heading "五、运动营养补充" [level=2] [ref=f1e151]
            - heading "5.1 运动人群常见补充剂" [level=3] [ref=f1e152]
