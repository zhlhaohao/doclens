            - paragraph [ref=f1e184]:
              - text: 2025年第十一届全民营养周的主题是
              - strong [ref=f1e185]: "\"吃动平衡 健康体重 全民行动\""
              - text: ，口号为
              - strong [ref=f1e186]: "\"健康中国 营养先行\""
              - text: 。
